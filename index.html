<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>App</title>
  </head>
  <body>
    <div id="app">
      <a href="revolut-camera-injector.apk" download>Download APK</a>
      <div id="camera-row">
        <select id="camera-select"></select>
        <label><input id="audio-toggle" type="checkbox" />Audio</label>
      </div>
      <p id="error"></p>
    </div>
    <video id="video" playsinline></video>
    <p id="video-size"></p>
    <section id="settings" class="settings">
      <h2>Settings:</h2>
    </section>
    <ol id="track-info"></ol>
    <h1>Camera constraints</h1>
    <ul id="camera-constraints"></ul>
    <h1>Supported constraints</h1>
    <ul id="constraints"></ul>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
